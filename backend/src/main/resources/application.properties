spring.application.name=gdg-bme-website

# SQLite database (no external setup needed, just a file)
spring.datasource.url=jdbc:sqlite:gdg.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Show SQL in console for debugging (set to false in production)
spring.jpa.show-sql=false

# JWT configuration
gdg.jwt.secret=GDGoCBME2026SuperSecretKeyForJwtTokenGenerationMustBe32CharsMin!!
gdg.jwt.expiration-ms=86400000

# Admin seed credentials (BCrypt encoded in data.sql)
gdg.admin.email=admin@gdgoc.bme.hu
gdg.admin.password=admin123

# Server port
server.port=8080
